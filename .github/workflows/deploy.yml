name: CI/CD Pipeline

on:
    push:
        branches:
            - main
    pull_request:
        branches:
            - main

jobs:
    build-and-deploy:
        runs-on: ubuntu-latest

        steps:
            - name: Checkout code
              uses: actions/checkout@v4

            - name: Setup Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: '20'
                  cache: 'npm'

            - name: Install dependencies
              run: npm ci

            - name: Create .env file
              if: github.ref == 'refs/heads/main'
              env:
                  ENV_FILE_CONTENT: ${{ secrets.ENV }}
              run: |
                  echo "$ENV_FILE_CONTENT" > .env

            - name: Build project
              run: npm run build

            - name: Copy files to server
              if: github.ref == 'refs/heads/main'
              uses: appleboy/scp-action@v0.1.7
              with:
                  host: ${{ secrets.SSH_HOST }}
                  username: ${{ secrets.SSH_USER }}
                  key: ${{ secrets.SSH_KEY }}
                  # We transfer only what's needed for Next.js production
                  source: '.next,public,package.json,package-lock.json,.env'
                  target: '~/projects/aqora-forms-01'

            - name: Execute post-deployment commands
              if: github.ref == 'refs/heads/main'
              uses: appleboy/ssh-action@v1.0.3
              with:
                  host: ${{ secrets.SSH_HOST }}
                  username: ${{ secrets.SSH_USER }}
                  key: ${{ secrets.SSH_KEY }}
                  script: |
                      # Load Node.js environment (for NVM users)
                      export NVM_DIR="$HOME/.nvm"
                      [ -s "$NVM_DIR/nvm.sh" ] && \. "$NVM_DIR/nvm.sh"
                      
                      # Fallback for standard bash profile
                      source ~/.bash_profile || source ~/.profile || source ~/.bashrc || true
                      
                      # Add standard paths just in case
                      export PATH=$PATH:$HOME/.npm-global/bin:/usr/local/bin:/usr/bin

                      cd ~/projects/aqora-forms-01

                      # Install production dependencies
                      npm ci --omit=dev

                      pm2 delete aqora-forms-01 || true

                      # Next.js starts through npm
                      pm2 start npm --name aqora-forms-01 -- run dev

                      pm2 save